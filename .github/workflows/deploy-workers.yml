name: Deploy Workers

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "packages/workers/**"
      - ".github/workflows/deploy-workers.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workers
        run: pnpm --filter workers... run build --if-present

      - name: Deploy workers
        # TODO: Add deployment commands once infrastructure target is chosen
        # (e.g., fly deploy, docker push to registry, kubectl apply, etc.)
        run: echo "Deploy step not yet configured — skipping."
